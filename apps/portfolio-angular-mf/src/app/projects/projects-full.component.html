<!-- Projects Full Gallery - Con Paginación -->
<div class="projects-full-main">
  <!-- Bento Grid -->
  <div class="bento-grid">
    <article
      *ngFor="let project of paginatedProjects(); trackBy: trackById"
      class="project-card"
      [ngClass]="[getGridClass(project.span)]"
    >
      <!-- Image Container -->
      <div class="project-image" [ngClass]="[getAspectClass(project.aspect)]">
        <img
          [src]="project.image"
          [alt]="project.title"
          loading="lazy"
          referrerpolicy="no-referrer"
        />
      </div>

      <!-- Content -->
      <div class="project-content">
        <!-- Tags -->
        <div class="project-tags">
          <span
            *ngFor="let tag of project.tags"
            class="tag"
          >
            <span class="tag-dot"></span>
            {{ tag }}
          </span>
        </div>

        <!-- Title -->
        <h3 class="project-title">{{ project.title }}</h3>

        <!-- Description -->
        <p class="project-description">{{ project.description }}</p>

        <!-- View Details Link -->
        <div class="project-footer">
          <a href="#" class="view-details">
            View Details
            <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
        </div>
      </div>
    </article>
  </div>

  <!-- Pagination Controls -->
  <div class="pagination-controls">
    <button
      class="pagination-btn"
      [disabled]="!canGoPrevious()"
      (click)="previousPage()"
      aria-label="Página anterior"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Anterior
    </button>

    <div class="pagination-info">
      <span class="current-page">{{ currentPage() }}</span>
      <span class="separator">/</span>
      <span class="total-pages">{{ totalPages() }}</span>
    </div>

    <button
      class="pagination-btn"
      [disabled]="!canGoNext()"
      (click)="nextPage()"
      aria-label="Página siguiente"
    >
      Siguiente
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</div>
